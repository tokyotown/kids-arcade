<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ivy's Arcade ✨</title>
<style>
  :root{
    --pink:#ff5fa2; --pink2:#ff8fc7; --purple:#8a5cff; --purple2:#b98bff;
    --teal:#37e0c8; --yellow:#ffd84d; --ink:#2a1a4a; --paper:#fff0fb;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;
    background:
      radial-gradient(circle at 20% 15%, #ffd6ef 0, rgba(255,214,239,0) 45%),
      radial-gradient(circle at 85% 20%, #d8c6ff 0, rgba(216,198,255,0) 45%),
      linear-gradient(160deg,#ffe3f4 0%, #efe0ff 55%, #dcfaf3 100%);
    color:var(--ink);
    display:flex; align-items:center; justify-content:center;
    min-height:100%; padding:14px; overflow-x:hidden;
  }
  #app{width:100%; max-width:860px;}
  .stage{
    position:relative; width:100%; aspect-ratio:800/560;
    background:#1c1030; border-radius:22px; overflow:hidden;
    box-shadow:0 18px 50px rgba(138,92,255,.45), inset 0 0 0 4px rgba(255,255,255,.15);
  }
  canvas{position:absolute; inset:0; width:100%; height:100%; display:block; touch-action:none;}

  .screen{position:absolute; inset:0; display:none; flex-direction:column;
    align-items:center; justify-content:flex-start; padding:22px; text-align:center;
    color:var(--paper); overflow:auto;}
  .screen.on{display:flex;}

  h1{font-size:clamp(26px,6vw,50px); margin:6px 0 2px;
    background:linear-gradient(90deg,#fff,#ffd84d,#37e0c8,#ff8fc7,#fff);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    letter-spacing:1px; text-shadow:0 2px 0 rgba(0,0,0,.12);}
  .tag{color:#ffd6ef; margin:0 0 12px; font-size:clamp(13px,2.6vw,17px);}
  .points{display:inline-block; background:rgba(255,255,255,.14); border:2px solid var(--yellow);
    color:#fff; border-radius:999px; padding:6px 16px; font-weight:bold; margin-bottom:12px;}
  .points b{color:var(--yellow);}

  .cards{display:grid; grid-template-columns:1fr 1fr; gap:14px; width:100%; max-width:560px;}
  .card{cursor:pointer; border:none; border-radius:18px; padding:16px 12px; color:#fff;
    font-family:inherit; font-size:clamp(15px,3.2vw,20px); font-weight:bold;
    display:flex; flex-direction:column; align-items:center; gap:6px;
    box-shadow:0 8px 0 rgba(0,0,0,.18); transition:transform .08s, box-shadow .08s;}
  .card .emoji{font-size:clamp(34px,8vw,48px); line-height:1;}
  .card small{font-weight:normal; opacity:.92; font-size:clamp(11px,2.4vw,13px);}
  .card:active{transform:translateY(4px); box-shadow:0 4px 0 rgba(0,0,0,.18);}
  .c-dance{background:linear-gradient(150deg,#ff5fa2,#ff8fc7);}
  .c-gym{background:linear-gradient(150deg,#8a5cff,#b98bff);}
  .c-ball{background:linear-gradient(150deg,#ff8a3d,#ffd84d);}
  .c-fetch{background:linear-gradient(150deg,#37e0c8,#3aa0ff);}

  .btnrow{display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:14px;}
  .btn{cursor:pointer; border:none; font-family:inherit; font-weight:bold;
    border-radius:999px; padding:11px 20px; font-size:16px; color:#fff;
    background:linear-gradient(150deg,var(--purple),var(--pink));
    box-shadow:0 6px 0 rgba(0,0,0,.18);}
  .btn.ghost{background:rgba(255,255,255,.16); box-shadow:0 6px 0 rgba(0,0,0,.14);}
  .btn.big{font-size:20px; padding:16px 26px;}
  .btn:active{transform:translateY(3px); box-shadow:0 3px 0 rgba(0,0,0,.18);}

  .hud{position:absolute; top:0; left:0; right:0; display:flex; justify-content:space-between;
    align-items:center; padding:10px 12px; color:#fff; font-weight:bold; z-index:5;
    text-shadow:0 1px 3px rgba(0,0,0,.5); pointer-events:none; gap:8px;}
  .hud button{pointer-events:auto; cursor:pointer; background:rgba(0,0,0,.35);
    border:2px solid rgba(255,255,255,.5); color:#fff; border-radius:999px;
    padding:5px 12px; font-family:inherit; font-weight:bold; font-size:14px;}
  #hudInfo{flex:1; text-align:center; font-size:15px;}
  .hint{position:absolute; bottom:10px; left:0; right:0; text-align:center; color:#fff;
    font-size:13px; text-shadow:0 1px 3px rgba(0,0,0,.6); z-index:5; pointer-events:none; padding:0 10px;}

  .scoretable{width:100%; max-width:520px; text-align:left; margin:0 auto;}
  .scoreblock{background:rgba(255,255,255,.1); border-radius:14px; padding:10px 14px; margin-bottom:10px;}
  .scoreblock h3{margin:0 0 6px; color:var(--yellow); font-size:17px;}
  .scoreblock .row{display:flex; justify-content:space-between; font-size:14px; padding:2px 0; color:#ffe9f6;}
  .scoreblock .row b{color:#fff;}

  .toast{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    background:rgba(28,16,48,.94); border:3px solid var(--yellow); color:#fff;
    padding:20px 26px; border-radius:18px; z-index:20; text-align:center; min-width:250px;
    box-shadow:0 12px 40px rgba(0,0,0,.5);}
  .toast h2{margin:0 0 8px; color:var(--yellow);}
  .toast input{font-family:inherit; font-size:18px; text-align:center; text-transform:uppercase;
    border-radius:10px; border:2px solid var(--purple2); padding:8px; width:150px; margin:6px 0;}
  .vs{display:flex; justify-content:space-around; margin:10px 0; font-size:16px;}
  .vs div{padding:0 10px;} .vs b{display:block; font-size:30px; color:#fff;}
  .hidden{display:none !important;}
  .credit{margin-top:auto; padding-top:12px; font-size:12px; color:#ffcdec;}
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:10px;left:10px;z-index:99999;background:rgba(0,0,0,.55);color:#fff;text-decoration:none;padding:6px 12px;border-radius:999px;font-family:sans-serif;font-size:13px;">⌂ Profiles</a>
<div id="app">
  <div class="stage">
    <canvas id="cv" width="800" height="560"></canvas>

    <!-- MENU -->
    <div class="screen on" id="menu">
      <h1>Ivy's Arcade ✨</h1>
      <p class="tag">Four games, staged levels, 1 or 2 players. Pick one! 💃🤸🏀🐾</p>
      <div class="points">Sparkle Points: <b id="pts">0</b> ⭐</div>
      <div class="cards">
        <button class="card c-dance" data-game="dance"><span class="emoji">💃</span>Dance Studio<small>3 songs, faster each time</small></button>
        <button class="card c-gym" data-game="gym"><span class="emoji">🤸</span>Gym Star<small>Time your vault</small></button>
        <button class="card c-ball" data-game="ball"><span class="emoji">🏀</span>Hoop Star<small>Moving hoop levels</small></button>
        <button class="card c-fetch" data-game="fetch"><span class="emoji">🐾</span>Fetch Frenzy<small>Catch with the pup</small></button>
      </div>
      <div class="btnrow">
        <button class="btn ghost" id="scoresBtn">🏆 High Scores</button>
        <button class="btn ghost" id="muteBtnMenu">🔊 Music</button>
      </div>
      <div class="credit">Made just for Ivy 💜 — works offline, just play!</div>
    </div>

    <!-- PRE-GAME (players) -->
    <div class="screen" id="pregame">
      <h1 id="pgTitle">Game</h1>
      <p class="tag" id="pgHow"></p>
      <p class="tag" id="pgLevels" style="color:#ffd84d"></p>
      <div class="btnrow">
        <button class="btn big" data-pl="1">👤 1 Player</button>
        <button class="btn big" data-pl="2">👥 2 Players</button>
      </div>
      <div class="btnrow"><button class="btn ghost" id="pgBack">← Menu</button></div>
    </div>

    <!-- SCORES -->
    <div class="screen" id="scores">
      <h1>🏆 High Scores</h1>
      <div class="scoretable" id="scoreTable"></div>
      <div class="btnrow">
        <button class="btn" id="scoresBack">← Menu</button>
        <button class="btn ghost" id="clearScores">Clear all</button>
      </div>
    </div>

    <!-- GAME HUD -->
    <div class="hud hidden" id="hud">
      <button id="backBtn">← Menu</button>
      <div id="hudInfo"></div>
      <button id="muteBtn">🔊</button>
    </div>
    <div class="hint hidden" id="hint"></div>

    <!-- TOAST -->
    <div class="toast hidden" id="toast"></div>
  </div>
</div>

<script>
"use strict";
(function(){
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;

  /* ---------- storage ---------- */
  const PK='ivysArcade_points', SK='ivysArcade_scores', MK='ivysArcade_muted';
  function getPoints(){ return parseInt(localStorage.getItem(PK)||'0',10)||0; }
  function addPoints(n){ try{ localStorage.setItem(PK,String(getPoints()+n)); }catch(e){} refreshPoints(); }
  function refreshPoints(){ document.getElementById('pts').textContent=getPoints(); }
  function getScores(){ try{ return JSON.parse(localStorage.getItem(SK)||'{}'); }catch(e){ return {}; } }
  function saveScores(o){ try{ localStorage.setItem(SK,JSON.stringify(o)); }catch(e){} }
  const GAME_NAMES={dance:'💃 Dance Studio', gym:'🤸 Gym Star', ball:'🏀 Hoop Star', fetch:'🐾 Fetch Frenzy'};
  function qualifies(key,score){ if(score<=0) return false; const l=(getScores()[key]||[]); return l.length<5 || score>l[l.length-1].score; }
  function submitCloud(game,name,score){try{fetch('/.netlify/functions/scores',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({profile:'ivy',game:game,name:name,score:score})}).catch(function(){});}catch(e){}}
  function commitScore(key,name,score){ const all=getScores(); const l=all[key]||[];
    l.push({name:(name||'IVY').slice(0,8).toUpperCase(),score}); l.sort((a,b)=>b.score-a.score); all[key]=l.slice(0,5); saveScores(all); submitCloud(key,(name||'IVY'),score); }

  /* ---------- audio core ---------- */
  let AC=null;
  function ac(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==='suspended') AC.resume(); return AC; }
  function tone(freq,dur,type,vol){ const a=ac(); if(!a) return;
    const o=a.createOscillator(),g=a.createGain(); o.type=type||'sine'; o.frequency.value=freq;
    g.gain.value=0.0001; o.connect(g); g.connect(a.destination); const t=a.currentTime;
    g.gain.exponentialRampToValueAtTime(vol||0.16,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+(dur||0.15));
    o.start(t); o.stop(t+(dur||0.15)+0.02); }
  function chord(fs,dur){ fs.forEach(f=>tone(f,dur||0.25,'triangle',0.10)); }
  const sfx={
    good(){ tone(720,0.10,'square',0.14); },
    perfect(){ tone(880,0.09,'square',0.15); setTimeout(()=>tone(1320,0.12,'square',0.13),70); },
    miss(){ tone(150,0.18,'sawtooth',0.12); },
    score(){ chord([523,659,784],0.35); },
    land(){ tone(500,0.12,'triangle',0.14); setTimeout(()=>tone(760,0.16,'triangle',0.12),90); },
    win(){ chord([523,659,784],0.2); setTimeout(()=>chord([659,784,1047],0.4),180); },
    boop(){ tone(300,0.1,'sine',0.12); },
    bark(){ tone(280,0.08,'square',0.14); setTimeout(()=>tone(200,0.12,'square',0.12),80); },
    level(){ tone(523,0.1,'square',0.14); setTimeout(()=>tone(659,0.1,'square',0.14),110); setTimeout(()=>tone(880,0.2,'square',0.14),220); }
  };

  /* ---------- music (chiptune step sequencer) ---------- */
  const N={r:0,C3:130.81,D3:146.83,E3:164.81,F3:174.61,G3:196.00,A3:220.00,B3:246.94,
    C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392.00,A4:440.00,B4:493.88,
    C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880.00};
  const PATTERNS={
    dance:{bpm:132, bass:[N.C3,0,N.C3,0,N.A3,0,N.A3,0,N.F3,0,N.F3,0,N.G3,0,N.G3,0],
      lead:[N.C5,N.E5,N.G5,N.E5,N.A4,N.C5,N.E5,N.C5,N.F4,N.A4,N.C5,N.A4,N.G4,N.B4,N.D5,N.B4]},
    gym:{bpm:120, bass:[N.E3,0,N.E3,0,N.C3,0,N.C3,0,N.G3,0,N.G3,0,N.A3,0,N.B3,0],
      lead:[N.E5,0,N.G5,0,N.C5,0,N.E5,0,N.G5,0,N.A5,0,N.G5,0,N.E5,0]},
    ball:{bpm:126, bass:[N.G3,0,N.G3,0,N.G3,0,N.E3,0,N.C3,0,N.C3,0,N.D3,0,N.G3,0],
      lead:[N.G4,N.G4,N.B4,N.D5,N.C5,0,N.E5,0,N.C5,N.C5,N.A4,N.C5,N.B4,0,N.D5,0]},
    fetch:{bpm:120, bass:[N.C3,0,N.G3,0,N.C3,0,N.G3,0,N.F3,0,N.C3,0,N.G3,0,N.G3,0],
      lead:[N.E5,N.G5,N.E5,N.C5,N.D5,N.F5,N.D5,N.B4,N.C5,N.E5,N.G5,N.E5,N.D5,N.C5,N.D5,0]}
  };
  const music={ timer:null, step:0, pat:null, stepMs:200,
    get muted(){ return localStorage.getItem(MK)==='1'; },
    setMuted(m){ try{ localStorage.setItem(MK, m?'1':'0'); }catch(e){} updateMuteBtns(); },
    toggle(){ this.setMuted(!this.muted); },
    start(key){ this.stop(); const p=PATTERNS[key]; if(!p) return; this.pat=p; this.step=0;
      this.stepMs=60000/p.bpm/2; ac(); this.timer=setInterval(()=>this.tick(), this.stepMs); },
    stop(){ if(this.timer){ clearInterval(this.timer); this.timer=null; } this.pat=null; },
    tick(){ const p=this.pat; if(!p) return; if(this.muted){ this.step++; return; }
      const li=this.step % p.lead.length, bi=this.step % p.bass.length;
      const dur=this.stepMs/1000;
      if(p.lead[li]) tone(p.lead[li],dur*0.9,'square',0.045);
      if(p.bass[bi]) tone(p.bass[bi],dur*0.95,'triangle',0.05);
      this.step++; }
  };
  function updateMuteBtns(){ const m=music.muted; const a=document.getElementById('muteBtn'), b=document.getElementById('muteBtnMenu');
    if(a) a.textContent=m?'🔇':'🔊'; if(b) b.textContent=(m?'🔇':'🔊')+' Music'; }

  /* ---------- screens / loop ---------- */
  const screens={ menu:document.getElementById('menu'), pregame:document.getElementById('pregame'), scores:document.getElementById('scores') };
  const hud=document.getElementById('hud'), hudInfo=document.getElementById('hudInfo'), hintEl=document.getElementById('hint'), toastEl=document.getElementById('toast');
  let current=null, raf=null, lastT=0, session=null;

  function showScreen(name){ Object.values(screens).forEach(s=>s.classList.remove('on')); if(screens[name]) screens[name].classList.add('on'); }
  function setHud(show,info){ hud.classList.toggle('hidden',!show); if(info!=null) hudInfo.innerHTML=info; }
  function setHint(t){ if(t){ hintEl.textContent=t; hintEl.classList.remove('hidden'); } else hintEl.classList.add('hidden'); }
  function stopLoop(){ if(raf){ cancelAnimationFrame(raf); raf=null; } }
  function loop(t){ if(!current) return; const dt=Math.min(0.05,(t-lastT)/1000||0); lastT=t; current.update(dt); current.draw(ctx); raf=requestAnimationFrame(loop); }

  /* ---------- session (players / alternating turns) ---------- */
  function openPregame(key){
    session={key:key}; const g=GAMES[key];
    document.getElementById('pgTitle').textContent=GAME_NAMES[key];
    document.getElementById('pgHow').textContent=g.how;
    document.getElementById('pgLevels').textContent=g.levels;
    showScreen('pregame');
  }
  function beginSession(players){
    session.players=players; session.cur=0; session.scores=[0,0];
    startPlayerRound();
  }
  function startPlayerRound(){
    const g=GAMES[session.key]; current=g; g.init();
    hideToast(); showScreen(null); setHud(true,'');
    music.start(session.key);
    lastT=performance.now(); stopLoop(); raf=requestAnimationFrame(loop);
  }
  // called by each game when its round ends
  function endRound(score, subtitle){
    if(!session) return; // player already quit to menu
    stopLoop();
    if(score>0) addPoints(score);
    session.scores[session.cur]=score;
    if(session.players===2 && session.cur===0){
      session.cur=1;
      toastEl.classList.remove('hidden');
      toastEl.innerHTML='<h2>Player 2, get ready! 👥</h2>'+
        '<div style="margin:6px 0 4px">Player 1 scored <b style="color:#ffd84d">'+score+'</b></div>'+
        '<div class="btnrow"><button class="btn big" id="p2go">Start Player 2</button></div>';
      document.getElementById('p2go').onclick=()=>{ ac(); startPlayerRound(); };
    } else {
      showResults(subtitle);
    }
  }
  function showResults(subtitle){
    music.stop();
    const key=session.key;
    toastEl.classList.remove('hidden');
    if(session.players===2){
      const p1=session.scores[0], p2=session.scores[1];
      const winner = p1===p2?'It\'s a tie! 🤝':(p1>p2?'Player 1 wins! 🏆':'Player 2 wins! 🏆');
      // auto-save both to high scores
      if(qualifies(key,p1)) commitScore(key,'P1',p1);
      if(qualifies(key,p2)) commitScore(key,'P2',p2);
      toastEl.innerHTML='<h2>'+winner+'</h2>'+
        '<div class="vs"><div>Player 1<b>'+p1+'</b></div><div>Player 2<b>'+p2+'</b></div></div>'+
        '<div class="btnrow"><button class="btn" id="againBtn">Play again</button>'+
        '<button class="btn ghost" id="menuBtn">Menu</button></div>';
      sfx.win();
      document.getElementById('againBtn').onclick=()=>{ hideToast(); beginSession(2); };
      document.getElementById('menuBtn').onclick=toMenu;
    } else {
      const score=session.scores[0];
      if(qualifies(key,score)){
        toastEl.innerHTML='<h2>New High Score! 🌟</h2>'+
          '<div style="font-size:30px;font-weight:bold">'+score+'</div>'+
          '<div style="margin:4px 0 8px;color:#ffd6ef">'+(subtitle||'')+'</div>'+
          '<input id="nm" maxlength="8" value="IVY" autocomplete="off">'+
          '<div class="btnrow"><button class="btn" id="saveScore">Save</button>'+
          '<button class="btn ghost" id="skipScore">Skip</button></div>';
        sfx.win();
        const inp=document.getElementById('nm'); setTimeout(()=>{inp.focus();inp.select();},50);
        document.getElementById('saveScore').onclick=()=>{ commitScore(key,inp.value,score); hideToast(); toMenu(); };
        document.getElementById('skipScore').onclick=()=>{ hideToast(); toMenu(); };
      } else {
        toastEl.innerHTML='<h2>Great job, Ivy! 💜</h2>'+
          '<div style="font-size:30px;font-weight:bold">'+score+'</div>'+
          '<div style="margin:4px 0 10px;color:#ffd6ef">'+(subtitle||'')+'</div>'+
          '<div class="btnrow"><button class="btn" id="againBtn">Play again</button>'+
          '<button class="btn ghost" id="menuBtn">Menu</button></div>';
        sfx.score();
        document.getElementById('againBtn').onclick=()=>{ hideToast(); beginSession(1); };
        document.getElementById('menuBtn').onclick=toMenu;
      }
    }
  }
  function toMenu(){ stopLoop(); current=null; session=null; music.stop(); setHud(false); setHint(''); hideToast(); ctx.clearRect(0,0,W,H); refreshPoints(); showScreen('menu'); }
  function hideToast(){ toastEl.classList.add('hidden'); toastEl.innerHTML=''; }
  function playerTag(){ return session&&session.players===2?('P'+(session.cur+1)+' · '):''; }

  /* ---------- input ---------- */
  const keys={};
  window.addEventListener('keydown',e=>{
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
    if(!keys[e.key]){ keys[e.key]=true; if(current&&current.onKey) current.onKey(e.key); }
  });
  window.addEventListener('keyup',e=>{ keys[e.key]=false; if(current&&current.onKeyUp) current.onKeyUp(e.key); });
  function ppos(e){ const r=cv.getBoundingClientRect(); const cx=(e.touches?e.touches[0].clientX:e.clientX), cy=(e.touches?e.touches[0].clientY:e.clientY);
    return { x:(cx-r.left)*(W/r.width), y:(cy-r.top)*(H/r.height) }; }
  cv.addEventListener('mousedown',e=>{ if(current&&current.onDown){ac();const p=ppos(e);current.onDown(p.x,p.y);} });
  cv.addEventListener('mousemove',e=>{ if(current&&current.onMove){const p=ppos(e);current.onMove(p.x,p.y);} });
  window.addEventListener('mouseup',()=>{ if(current&&current.onUp) current.onUp(); });
  cv.addEventListener('touchstart',e=>{ e.preventDefault(); if(current&&current.onDown){ac();const p=ppos(e);current.onDown(p.x,p.y);} },{passive:false});
  cv.addEventListener('touchmove',e=>{ e.preventDefault(); if(current&&current.onMove){const p=ppos(e);current.onMove(p.x,p.y);} },{passive:false});
  cv.addEventListener('touchend',e=>{ e.preventDefault(); if(current&&current.onUp) current.onUp(); },{passive:false});

  /* ---------- draw helpers ---------- */
  function rr(c,x,y,w,h,r){ c.beginPath(); c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }
  function txt(c,s,x,y,size,col,align){ c.fillStyle=col||'#fff'; c.font='bold '+size+'px "Trebuchet MS",sans-serif'; c.textAlign=align||'center'; c.textBaseline='middle'; c.fillText(s,x,y); }
  function drawPup(c,x,y,s,legPhase){
    c.save(); c.translate(x,y); c.scale(s,s);

        c.fillStyle='rgba(0,0,0,.4)'; rr(c,18,H-30,180,14,7); c.fill(); c.fillStyle=pow>0.85?'#ff3b3b':'#ffd84d'; rr(c,18,H-30,180*pow,14,7); c.fill(); }
      c.fillStyle='#ff8a3d'; c.beginPath(); c.arc(this.bx,this.by,16,0,7); c.fill();
      c.strokeStyle='#7a3b12'; c.lineWidth=2; c.beginPath(); c.arc(this.bx,this.by,16,0,7); c.moveTo(this.bx-16,this.by); c.lineTo(this.bx+16,this.by); c.moveTo(this.bx,this.by-16); c.lineTo(this.bx,this.by+16); c.stroke();
      if(this.msgT>0){ c.globalAlpha=Math.min(1,this.msgT*1.5); txt(c,this.msg,W/2,H*0.18,26,'#fff'); c.globalAlpha=1; }
      txt(c,'Shot '+Math.min(this.shotsPer,this.shotsThis+1)+'/'+this.shotsPer,W-14,H-16,14,'#fff5e6','right');
      drawBanner(c,this);
    }
  };

  /* ==================================================================
     GAME 4 — FETCH FRENZY (responsive, staged)
     ================================================================== */
  const Fetch={
    key:'fetch', how:'Move the pup with ← → or by sliding your finger. Catch the good stuff, dodge boots!', levels:'Speeds up every 10 catches — how far can you get?',
    init(){
      this.dogx=W*0.5; this.dogy=H-54; this.targetX=null; this.moveDir=0;
      this.score=0; this.lives=3; this.combo=1; this.catches=0; this.level=1;
      this.items=[]; this.spawnT=0; this.legPhase=0; this.t=0; this.msg=''; this.msgT=0;
      this.banner='LEVEL 1'; this.bannerT=1.1; this.over=false;
      setHint('Slide your finger (or ← →) to move the pup. Catch 🎾 🦴 🥏 — dodge 🥾 rocks!');
    },
    gap(){ return Math.max(0.42, 0.72 - (this.level-1)*0.05); },
    fallSpeed(){ return 175 + (this.level-1)*32; },
    onKey(k){ if(k==='ArrowLeft') this.moveDir=-1; else if(k==='ArrowRight') this.moveDir=1; },
    onKeyUp(k){ if((k==='ArrowLeft'&&this.moveDir===-1)||(k==='ArrowRight'&&this.moveDir===1)) this.moveDir=0; },
    onDown(x,y){ this.targetX=x; },
    onMove(x,y){ this.targetX=x; },
    onUp(){ this.targetX=null; },
    spawn(){ const good=Math.random()<0.70; let type;
      if(good) type=['ball','stick','frisbee'][Math.random()*3|0]; else type=Math.random()<0.5?'boot':'rock';
      this.items.push({x:36+Math.random()*(W-72), y:-20, type, vy:this.fallSpeed()+Math.random()*50, spin:0}); },
    levelUp(){ this.level++; this.banner='LEVEL '+this.level+'! ⚡'; this.bannerT=1.1; sfx.level(); },
    update(dt){
      this.t+=dt; this.legPhase+=dt*10; if(this.msgT>0) this.msgT-=dt;
      if(this.bannerT>0) this.bannerT-=dt;
      if(this.over) return;
      // responsive movement: keyboard + direct-ish pointer follow
      if(this.moveDir) this.dogx+=this.moveDir*420*dt;
      if(this.targetX!=null){ this.dogx += (this.targetX-this.dogx)*Math.min(1,dt*20); }
      this.dogx=Math.max(34,Math.min(W-34,this.dogx));
      if(this.bannerT>0) return;
      this.spawnT+=dt; if(this.spawnT>=this.gap()){ this.spawnT=0; this.spawn(); }
      for(const it of this.items){ if(it.dead) continue; it.y+=it.vy*dt; it.spin+=dt*6;
        if(it.y>this.dogy-30 && it.y<this.dogy+18 && Math.abs(it.x-this.dogx)<46){
          it.dead=true;
          if(it.type==='boot'||it.type==='rock'){ this.lives--; this.combo=1; this.msg='Oops! 💥'; this.msgT=0.7; sfx.miss();
            if(this.lives<=0){ this.over=true; setTimeout(()=>endRound(this.score, this.catches+' catches • level '+this.level),450); return; } }
          else { const base=it.type==='frisbee'?30:it.type==='stick'?20:10; const pts=base*this.combo; this.score+=pts;
            this.combo=Math.min(3,this.combo+1); this.catches++; this.msg='+'+pts+(this.combo>1?' x'+this.combo:''); this.msgT=0.55; sfx.bark();
            if(this.catches%10===0) this.levelUp(); }
          hudInfo.innerHTML=playerTag()+'L'+this.level+' · Score '+this.score+' · ❤'+this.lives+' · x'+this.combo;
        }
      }
      for(const it of this.items){ if(!it.dead && it.y>H+20){ it.dead=true; if(it.type!=='boot'&&it.type!=='rock') this.combo=1; } }
      this.items=this.items.filter(it=>!it.dead && it.y<H+40);
    },
    draw(c){
      const g=c.createLinearGradient(0,0,0,H); g.addColorStop(0,'#5a3d8c'); g.addColorStop(0.6,'#c76ba8'); g.addColorStop(1,'#ffd0a0'); c.fillStyle=g; c.fillRect(0,0,W,H);
      c.fillStyle='#fff6d0'; c.beginPath(); c.arc(W*0.82,70,26,0,7); c.fill();
      c.fillStyle='rgba(255,255,255,.85)'; for(let i=0;i<24;i++){ c.fillRect((i*71%W),(i*53%180),2,2); }
      c.fillStyle='#3f7a3a'; c.fillRect(0,H-28,W,28);
      c.fillStyle='#ff5fa2'; c.beginPath(); c.moveTo(60,H-28); c.lineTo(110,H-82); c.lineTo(160,H-28); c.fill();
      c.fillStyle='#37e0c8'; c.beginPath(); c.moveTo(W-160,H-28); c.lineTo(W-110,H-78); c.lineTo(W-60,H-28); c.fill();
      const fl=6+Math.sin(this.t*10)*3; c.fillStyle='#ff9b3d'; c.beginPath(); c.moveTo(W*0.5-10,H-28); c.quadraticCurveTo(W*0.5,H-38-fl,W*0.5+10,H-28); c.fill();
      c.fillStyle='#ffd84d'; c.beginPath(); c.moveTo(W*0.5-5,H-28); c.quadraticCurveTo(W*0.5,H-32-fl*0.6,W*0.5+5,H-28); c.fill();
      for(const it of this.items){ if(!it.dead) this.drawItem(c,it); }
      // catch glow under pup
      c.globalAlpha=0.25; c.fillStyle='#fff'; c.beginPath(); c.ellipse(this.dogx,this.dogy-6,44,12,0,0,7); c.fill(); c.globalAlpha=1;
      drawPup(c,this.dogx,this.dogy,1.15,this.legPhase);
      if(this.msgT>0){ c.globalAlpha=Math.min(1,this.msgT*1.6); txt(c,this.msg,this.dogx,this.dogy-48,20,'#fff'); c.globalAlpha=1; }
      for(let i=0;i<this.lives;i++){ txt(c,'❤',24+i*24,26,20,'#ff5fa2','left'); }
      drawBanner(c,this);
    },
    drawItem(c,it){ c.save(); c.translate(it.x,it.y); c.rotate(it.spin*0.5);
      if(it.type==='ball'){ c.fillStyle='#d4f542'; c.beginPath(); c.arc(0,0,12,0,7); c.fill(); c.strokeStyle='#fff'; c.lineWidth=1.5; c.beginPath(); c.arc(-4,0,12,-0.8,0.8); c.stroke(); }
      else if(it.type==='stick'){ c.strokeStyle='#8a5a2b'; c.lineWidth=6; c.lineCap='round'; c.beginPath(); c.moveTo(-13,4); c.lineTo(13,-4); c.stroke(); }
      else if(it.type==='frisbee'){ c.fillStyle='#37e0c8'; c.beginPath(); c.ellipse(0,0,15,7,0,0,7); c.fill(); c.strokeStyle='#0fa891'; c.lineWidth=2; c.stroke(); }
      else if(it.type==='boot'){ c.fillStyle='#5b3a2a'; rr(c,-10,-12,12,20,3); c.fill(); rr(c,-10,4,22,8,3); c.fill(); }
      else { c.fillStyle='#888'; c.beginPath(); c.arc(0,0,11,0,7); c.fill(); c.fillStyle='#666'; c.beginPath(); c.arc(-3,-2,4,0,7); c.fill(); }
      c.restore(); }
  };

  const GAMES={dance:Dance, gym:Gym, ball:Ball, fetch:Fetch};

  /* ---------- scores screen ---------- */
  function renderScores(){ const all=getScores(), box=document.getElementById('scoreTable'); box.innerHTML='';
    Object.keys(GAME_NAMES).forEach(k=>{ const list=all[k]||[], div=document.createElement('div'); div.className='scoreblock';
      let rows= list.length? list.map((s,i)=>'<div class="row"><span>'+(i+1)+'. '+s.name+'</span><b>'+s.score+'</b></div>').join('') : '<div class="row"><span>No scores yet — be the first!</span></div>';
      div.innerHTML='<h3>'+GAME_NAMES[k]+'</h3>'+rows; box.appendChild(div); }); }

  /* ---------- wire up ---------- */
  document.querySelectorAll('.card').forEach(b=>b.addEventListener('click',()=>{ ac(); openPregame(b.dataset.game); }));
  document.querySelectorAll('#pregame [data-pl]').forEach(b=>b.addEventListener('click',()=>{ ac(); beginSession(parseInt(b.dataset.pl,10)); }));
  document.getElementById('pgBack').onclick=()=>{ session=null; showScreen('menu'); };
  document.getElementById('scoresBtn').onclick=()=>{ renderScores(); showScreen('scores'); };
  document.getElementById('scoresBack').onclick=()=>showScreen('menu');
  document.getElementById('clearScores').onclick=()=>{ if(confirm('Clear all high scores?')){ saveScores({}); renderScores(); } };
  document.getElementById('backBtn').onclick=toMenu;
  document.getElementById('muteBtn').onclick=()=>music.toggle();
  document.getElementById('muteBtnMenu').onclick=()=>music.toggle();

  updateMuteBtns(); refreshPoints();
})();
</script>
